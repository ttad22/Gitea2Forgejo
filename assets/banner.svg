<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img"
     aria-label="GiteaForgejoMigrator project banner">
  <title>GiteaForgejoMigrator — banner</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1f1f"/>
      <stop offset="100%" stop-color="#2c2c2c"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>

  <g>
    <circle cx="180" cy="170" r="86" fill="#f5f5f4" stroke="#f5f5f4" stroke-width="2"/>
    <text x="180" y="200" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="100" font-weight="600" fill="#222222">G</text>
  </g>

  <g stroke="#ff7a1a" stroke-width="4" fill="none">
    <line x1="290" y1="156" x2="940" y2="156" stroke-dasharray="10 12"/>
    <line x1="290" y1="186" x2="940" y2="186" stroke-dasharray="10 12"/>
  </g>
  <polygon points="940,128 990,172 940,216" fill="#ff7a1a"/>

  <g>
    <polygon points="1080,90 1160,134 1160,206 1080,250 1000,206 1000,134"
             fill="#ff7a1a"/>
    <text x="1080" y="200" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="100" font-weight="700" fill="#1f1f1f">F</text>
  </g>

  <g font-family="'Helvetica Neue', Arial, sans-serif" fill="#f5f5f4">
    <text x="180" y="46" font-size="36" font-weight="700">GiteaForgejoMigrator</text>
    <text x="180" y="80" font-size="20" fill="#cfcfcf">Operator-first preflight, gating, and staging plan.</text>
    <text x="180" y="298" font-size="16" fill="#a8a8a8">“Once you’ve migrated, you’re done.”</text>
  </g>
